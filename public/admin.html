<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin | YP Labs</title>
  <style>
    :root{--bg:#080d14;--panel:#101722;--panel2:#151e2b;--line:#273244;--text:#f5f7fa;--muted:#99a6b8;--cyan:#4fd3ec;--amber:#e8a23d;--green:#5fd79a;--red:#ff8181;--r:7px}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}.hidden{display:none!important}.muted{color:var(--muted)}.accent{color:var(--cyan)}.amber{color:var(--amber)}
    .login{min-height:100vh;display:grid;place-items:center;padding:20px}.login-card{width:min(430px,100%);padding:26px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r)}.login-card h1{margin:0 0 6px}.login-card p{margin:0 0 22px;color:var(--muted)}
    .shell{min-height:100vh;display:grid;grid-template-columns:240px 1fr}.side{background:#0b111a;border-right:1px solid var(--line);padding:20px 14px;position:sticky;top:0;height:100vh}.brand{font-weight:850;font-size:18px;margin:0 8px 18px}.nav{display:grid;gap:6px}.nav button{border:0;border-radius:6px;background:transparent;color:var(--muted);text-align:left;padding:10px 12px}.nav button.active,.nav button:hover{background:var(--panel2);color:var(--text)}.content{padding:26px;max-width:1360px}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:22px}.top h1{margin:0 0 4px}.top p{margin:0;color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r)}.card h2,.card h3{margin:0}.card-head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:10px}.card-body{padding:16px}.metric{font-size:29px;font-weight:850}.list{display:grid}.row{display:grid;grid-template-columns:1.35fr .8fr .8fr .8fr auto;gap:12px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line)}.row:last-child{border-bottom:0}.row:hover{background:var(--panel2)}.row-title{font-weight:750}.row-sub{font-size:12px;color:var(--muted)}.badge{display:inline-flex;padding:4px 8px;border-radius:99px;background:#172535;color:var(--cyan);font-size:11px;text-transform:capitalize}.badge.red{background:#301a20;color:var(--red)}.badge.green{background:#142a22;color:var(--green)}
    .btn{border:1px solid var(--line);border-radius:5px;background:var(--panel2);color:var(--text);padding:8px 11px}.btn:hover{border-color:#46566e}.btn.primary{background:var(--cyan);border-color:var(--cyan);color:#061018;font-weight:800}.btn.danger{color:var(--red)}.btn.small{padding:5px 8px;font-size:12px}.actions{display:flex;gap:8px;flex-wrap:wrap}.form{display:grid;gap:12px}.form.two{grid-template-columns:1fr 1fr}.field{display:grid;gap:6px}.field span{font-size:11px;text-transform:uppercase;color:var(--muted);letter-spacing:.06em}.input{width:100%;min-width:0;padding:10px 11px;background:#0b111a;color:var(--text);border:1px solid var(--line);border-radius:5px}.input:focus{outline:2px solid #4fd3ec33;border-color:var(--cyan)}.notice{padding:11px 13px;border:1px solid var(--line);border-radius:5px;color:var(--muted)}.notice.error{border-color:#633;color:var(--red)}.status{min-height:20px;color:var(--red);font-size:12px}
    @media(max-width:920px){.shell{grid-template-columns:1fr}.side{position:static;height:auto}.nav{display:flex;overflow:auto}.nav button{white-space:nowrap}.content{padding:18px}.grid,.grid.two{grid-template-columns:1fr}.row{grid-template-columns:1fr auto}.row>*:nth-child(2),.row>*:nth-child(3),.row>*:nth-child(4){display:none}.form.two{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="login" class="login">
    <form class="login-card form" id="loginForm">
      <div class="accent" style="font-weight:850">YP LABS / ADMIN</div>
      <div><h1>Admin sign in</h1><p>Admin and master staff access only.</p></div>
      <label class="field"><span>Email</span><input class="input" id="email" type="email" autocomplete="email" required></label>
      <label class="field"><span>Password</span><input class="input" id="password" type="password" autocomplete="current-password" required></label>
      <div class="status" id="loginStatus"></div>
      <button class="btn primary">Sign in</button>
      <a class="btn" href="/" style="text-align:center;text-decoration:none">Back to site</a>
    </form>
  </div>

  <div id="app" class="shell hidden">
    <aside class="side">
      <div class="brand">YP Labs Admin</div>
      <nav class="nav" id="nav"></nav>
      <button class="btn" id="signOut" style="margin:18px 8px">Sign out</button>
    </aside>
    <main class="content" id="content"></main>
  </div>

<script>
  const state={token:localStorage.getItem('yp_admin_token')||'',user:null,page:'overview',users:[],overview:null};
  const adminRoles=['admin','master_staff'];
  const $=s=>document.querySelector(s);
  const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
  const money=v=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(Number(v||0));
  const date=v=>v?new Intl.DateTimeFormat('en-US',{dateStyle:'medium',timeStyle:'short'}).format(new Date(v)):'-';
  const pct=v=>`${Number(v||0).toFixed(2)}%`;
  const empty=t=>`<div class="notice">${esc(t)}</div>`;
  async function api(path,options={}){const response=await fetch('/api'+path,{...options,headers:{...(options.body?{'Content-Type':'application/json'}:{}),Authorization:`Bearer ${state.token}`,...options.headers}});const data=await response.json().catch(()=>({}));if(response.status===401){logout();throw new Error('Please sign in again.')}if(!response.ok)throw new Error(data.error||data.errors?.[0]?.msg||'Request failed.');return data}
  function head(title,sub,action=''){return `<div class="top"><div><h1>${esc(title)}</h1><p>${esc(sub)}</p></div>${action}</div>`}
  function badge(v){const s=String(v||'');return `<span class="badge ${s==='active'||s==='paid'||s==='success'?'green':s==='suspended'||s==='failed'?'red':''}">${esc(s.replaceAll('_',' '))}</span>`}
  function logout(){localStorage.removeItem('yp_admin_token');state.token='';state.user=null;$('#app').classList.add('hidden');$('#login').classList.remove('hidden');$('#password').value=''}
  $('#signOut').onclick=logout;
  $('#loginForm').onsubmit=async e=>{e.preventDefault();const out=$('#loginStatus');out.textContent='Signing in...';try{const data=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:$('#email').value,password:$('#password').value})}).then(async r=>{const d=await r.json();if(!r.ok)throw new Error(d.error||'Sign in failed.');return d});if(!adminRoles.includes(data.user.role))throw new Error('This account does not have admin access.');state.token=data.accessToken;state.user=data.user;localStorage.setItem('yp_admin_token',state.token);await start()}catch(error){out.textContent=error.message}};
  async function start(){if(!state.token)return;state.user=await api('/auth/me');if(!adminRoles.includes(state.user.role))throw new Error('This account does not have admin access.');$('#login').classList.add('hidden');$('#app').classList.remove('hidden');buildNav();navigate(state.page)}
  function buildNav(){const items=[['overview','Overview'],['users','Users'],['activity','Login activity'],['discounts','Discount codes'],['performance','Performance']];$('#nav').innerHTML=items.map(([id,label])=>`<button data-page="${id}">${label}</button>`).join('');$('#nav').onclick=e=>{const b=e.target.closest('button');if(b)navigate(b.dataset.page)}}
  async function navigate(page){state.page=page;document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===page));$('#content').innerHTML=empty('Loading...');try{if(page==='overview')await renderOverview();if(page==='users')await renderUsers();if(page==='activity')await renderActivity();if(page==='discounts')await renderDiscounts();if(page==='performance')await renderPerformance()}catch(error){$('#content').innerHTML=`<div class="notice error">${esc(error.message)}</div>`}}
  async function renderOverview(){const data=await api('/admin/overview');state.overview=data;$('#content').innerHTML=head('Admin overview','Platform controls, account status, billing, and integration readiness')+`<div class="grid"><div class="card"><div class="card-body"><div class="muted">Total users</div><div class="metric accent">${data.users.total_users}</div></div></div><div class="card"><div class="card-body"><div class="muted">Clients</div><div class="metric">${data.users.clients}</div></div></div><div class="card"><div class="card-body"><div class="muted">Collected revenue</div><div class="metric amber">${money(data.billing.collected_revenue)}</div></div></div><div class="card"><div class="card-body"><div class="muted">Reported profit</div><div class="metric">${money(data.performance.reported_profit)}</div></div></div></div><div class="grid two" style="margin-top:14px"><div class="card"><div class="card-head"><h3>Integration readiness</h3></div><div class="card-body">${Object.entries(data.integrations).map(([k,v])=>`<div class="row" style="grid-template-columns:1fr auto"><div class="row-title">${esc(k.replaceAll('_',' '))}</div>${badge(v)}</div>`).join('')}</div></div><div class="card"><div class="card-head"><h3>Revenue model signals</h3></div><div class="card-body"><p class="muted">Use performance records to track client profit, platform fees, and growth rates. Subscription pricing based on growth still needs a formal billing rule before automatic charges are enabled.</p><div class="metric">${pct(data.performance.avg_growth_rate)}</div><div class="muted">Average recorded growth rate</div></div></div></div>`}
  async function renderUsers(){state.users=await api('/admin/users');$('#content').innerHTML=head('Users','View clients, staff, admins, account status, billing, and reported platform profit')+`<div class="card list">${state.users.length?state.users.map(u=>`<div class="row"><div><div class="row-title">${esc(u.name)}</div><div class="row-sub">${esc(u.email)} · ${esc(u.business_name||'No business')}</div></div>${badge(u.role)}${badge(u.status)}<span>${money(u.reported_profit)}</span><div class="actions"><button class="btn small" onclick="editUser('${u.id}')">Edit</button><button class="btn small danger" onclick="resetPassword('${u.id}')">Reset</button></div></div>`).join(''):empty('No users found.')}</div>`}
  window.editUser=async id=>{const u=state.users.find(x=>x.id===id);const role=prompt('Role: client, staff, admin, master_staff',u.role);if(role===null)return;const status=prompt('Status: pending, active, suspended',u.status);if(status===null)return;await api('/admin/users/'+id,{method:'PATCH',body:JSON.stringify({role,status})});navigate('users')};
  window.resetPassword=async id=>{if(!confirm('Reset this user password and generate a temporary password?'))return;const data=await api('/admin/users/'+id+'/reset-password',{method:'POST',body:'{}'});alert(`Temporary password for ${data.user.email}: ${data.temporaryPassword}`)};
  async function renderActivity(){const rows=await api('/admin/login-activity');$('#content').innerHTML=head('Login activity','Recent successful and failed sign-in attempts')+`<div class="card list">${rows.length?rows.map(r=>`<div class="row"><div><div class="row-title">${esc(r.email||'Unknown email')}</div><div class="row-sub">${esc(r.name||'No user')} · ${esc(r.ip_address||'No IP')}</div></div>${badge(r.success?'success':'failed')}<span>${esc(r.reason||'-')}</span><span>${date(r.created_at)}</span><span></span></div>`).join(''):empty('No login activity recorded yet.')}</div>`}
  async function renderDiscounts(){const rows=await api('/admin/discounts');$('#content').innerHTML=head('Discount codes','Create codes for discounts, deals, and pricing adjustments',`<button class="btn primary" onclick="createDiscount()">Create code</button>`)+`<div class="card list">${rows.length?rows.map(d=>`<div class="row"><div><div class="row-title">${esc(d.code)}</div><div class="row-sub">${esc(d.description||'No description')}</div></div><span>${esc(d.discount_type)} ${d.discount_type==='percent'?Number(d.discount_value).toFixed(0)+'%':money(d.discount_value)}</span>${badge(d.active?'active':'suspended')}<span>${d.redemptions}/${d.max_redemptions||'unlimited'}</span><button class="btn small" onclick="toggleDiscount('${d.id}',${!d.active})">${d.active?'Disable':'Enable'}</button></div>`).join(''):empty('No discount codes yet.')}</div>`}
  window.createDiscount=async()=>{const code=prompt('Discount code');if(!code)return;const type=prompt('Type: percent or amount','percent');if(!type)return;const value=prompt('Value. Example: 20 for 20 percent or 100 for $100');if(!value)return;await api('/admin/discounts',{method:'POST',body:JSON.stringify({code,discount_type:type,discount_value:Number(value),description:'Created from admin dashboard'})});navigate('discounts')};
  window.toggleDiscount=async(id,active)=>{await api('/admin/discounts/'+id,{method:'PATCH',body:JSON.stringify({active})});navigate('discounts')};
  async function renderPerformance(){const rows=await api('/admin/performance');$('#content').innerHTML=head('Performance tracking','Record client profit, platform fee, and growth measurements',`<button class="btn primary" onclick="createPerformance()">Add record</button>`)+`<div class="card list">${rows.length?rows.map(p=>`<div class="row"><div><div class="row-title">${esc(p.name||'Unknown client')}</div><div class="row-sub">${esc(p.email||'')} · ${date(p.period_start)} to ${date(p.period_end)}</div></div><span>${money(p.reported_profit)}</span><span>${money(p.platform_fee)}</span><span>${pct(p.growth_rate)}</span><span></span></div>`).join(''):empty('No performance records yet.')}</div>`}
  window.createPerformance=async()=>{const users=state.users.length?state.users:await api('/admin/users');const email=prompt('Client email for performance record');if(!email)return;const user=users.find(u=>u.email.toLowerCase()===email.toLowerCase());if(!user){alert('Client not found. Open Users first or confirm email.');return}const profit=prompt('Reported profit gained');if(profit===null)return;const fee=prompt('Platform fee charged',0);if(fee===null)return;const growth=prompt('Growth rate percent, optional',0);await api('/admin/performance',{method:'POST',body:JSON.stringify({user_id:user.id,period_start:new Date().toISOString().slice(0,10),period_end:new Date().toISOString().slice(0,10),reported_profit:Number(profit),platform_fee:Number(fee),growth_rate:Number(growth),notes:'Created from admin dashboard'})});navigate('performance')};
  if(state.token)start().catch(()=>logout());
</script>
</body>
</html>
