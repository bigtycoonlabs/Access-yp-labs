<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="YP Labs client and staff project workspace">
  <title>Workspace | YP Labs</title>
  <style>
    :root{--bg:#080d14;--panel:#101722;--panel2:#151e2b;--line:#273244;--text:#f5f7fa;--muted:#99a6b8;--cyan:#4fd3ec;--amber:#e8a23d;--green:#5fd79a;--red:#ff8181;--r:7px}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,textarea,select{font:inherit}button{cursor:pointer}.hidden{display:none!important}
    a{color:inherit}.shell{min-height:100vh;display:grid;grid-template-columns:230px 1fr}.sidebar{position:sticky;top:0;height:100vh;border-right:1px solid var(--line);padding:22px 14px;background:#0b111a}.brand{display:flex;align-items:center;gap:10px;padding:0 9px 22px;font-weight:800;font-size:17px}.brand-mark{display:grid;place-items:center;width:30px;height:30px;border:1px solid var(--cyan);color:var(--cyan);border-radius:5px}.nav{display:grid;gap:5px}.nav button{width:100%;padding:10px 12px;border:0;border-radius:5px;background:transparent;color:var(--muted);text-align:left}.nav button:hover,.nav button.active{background:var(--panel2);color:var(--text)}.sidebar-foot{position:absolute;left:14px;right:14px;bottom:18px;padding:12px;border-top:1px solid var(--line);color:var(--muted);font-size:12px}
    main{min-width:0}.topbar{height:68px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 28px}.identity{color:var(--muted);font-size:13px}.identity strong{display:block;color:var(--text)}.content{padding:28px;max-width:1280px}.page-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:22px}.page-head h1{margin:0 0 4px;font-size:25px}.page-head p{margin:0;color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r)}.card-head{padding:14px 16px;border-bottom:1px solid var(--line);font-weight:700;display:flex;justify-content:space-between;gap:12px}.card-body{padding:16px}.metric{font-size:28px;font-weight:800}.muted{color:var(--muted)}.accent{color:var(--cyan)}.amber{color:var(--amber)}
    .badge{display:inline-flex;align-items:center;padding:4px 8px;border-radius:99px;background:#172535;color:var(--cyan);font-size:11px;text-transform:capitalize}.badge.green{background:#142a22;color:var(--green)}.badge.amber{background:#2c2317;color:var(--amber)}
    .list{display:grid}.row{display:grid;grid-template-columns:minmax(180px,1.6fr) minmax(110px,.8fr) minmax(110px,.8fr) auto;gap:14px;align-items:center;padding:13px 16px;border-bottom:1px solid var(--line)}.row:last-child{border-bottom:0}.row:hover{background:var(--panel2)}.row-title{font-weight:650}.row-sub{font-size:12px;color:var(--muted)}
    .btn{border:1px solid var(--line);border-radius:5px;background:var(--panel2);color:var(--text);padding:9px 13px}.btn:hover{border-color:#46566e}.btn.primary{background:var(--cyan);border-color:var(--cyan);color:#061018;font-weight:750}.btn.danger{color:var(--red)}.btn.small{padding:6px 9px;font-size:12px}.actions{display:flex;gap:8px;flex-wrap:wrap}
    .form{display:grid;gap:12px}.form.two{grid-template-columns:1fr 1fr}.field{display:grid;gap:6px}.field span{font-size:11px;text-transform:uppercase;color:var(--muted);letter-spacing:.06em}.input{width:100%;min-width:0;padding:10px 11px;background:#0b111a;color:var(--text);border:1px solid var(--line);border-radius:5px}.input:focus{outline:2px solid #4fd3ec33;border-color:var(--cyan)}textarea.input{resize:vertical}.notice{padding:11px 13px;border:1px solid var(--line);border-radius:5px;color:var(--muted)}.notice.error{border-color:#633;color:var(--red)}
    .thread{display:grid;gap:10px;max-height:460px;overflow:auto;padding:16px}.message{max-width:78%;padding:10px 12px;background:var(--panel2);border-radius:6px}.message.mine{margin-left:auto;background:#17303a}.message-meta{font-size:11px;color:var(--muted);margin-top:5px}.empty{padding:32px;text-align:center;color:var(--muted)}
    .login{min-height:100vh;display:grid;place-items:center;padding:20px}.login-card{width:min(410px,100%);padding:26px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r)}.login-card h1{margin:0 0 6px;font-size:25px}.login-card p{margin:0 0 22px;color:var(--muted)}.login-brand{color:var(--cyan);font-weight:800;margin-bottom:18px}.status{min-height:20px;color:var(--red);font-size:12px}
    @media(max-width:850px){.shell{grid-template-columns:1fr}.sidebar{position:static;height:auto;border-right:0;border-bottom:1px solid var(--line);padding:12px}.brand{padding:0 4px 10px}.nav{display:flex;overflow:auto}.nav button{width:auto;white-space:nowrap}.sidebar-foot{display:none}.topbar{padding:0 16px}.content{padding:18px}.grid,.grid.two{grid-template-columns:1fr}.row{grid-template-columns:1fr auto}.row>*:nth-child(2),.row>*:nth-child(3){display:none}.form.two{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="login" class="login">
    <form class="login-card form" id="loginForm">
      <div class="login-brand">YP LABS / WORKSPACE</div>
      <div><h1>Sign in</h1><p>Access your project delivery workspace.</p></div>
      <label class="field"><span>Email</span><input class="input" id="email" type="email" autocomplete="email" required></label>
      <label class="field"><span>Password</span><input class="input" id="password" type="password" autocomplete="current-password" required></label>
      <div class="status" id="loginStatus" role="alert"></div>
      <button class="btn primary" type="submit">Sign in</button>
      <a class="btn" href="/" style="text-align:center;text-decoration:none">Back to YP Labs</a>
    </form>
  </div>
  <div id="workspace" class="shell hidden">
    <aside class="sidebar">
      <a class="brand" href="/" style="text-decoration:none"><span class="brand-mark">YP</span> Labs</a>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-foot">Project delivery, communication, files, and billing in one place.</div>
    </aside>
    <main>
      <header class="topbar"><div class="identity" id="identity"></div><button class="btn small" id="signOut">Sign out</button></header>
      <section class="content" id="content"></section>
    </main>
  </div>
<script>
  const state={token:'',user:null,projects:[],project:null,page:'overview'};
  const staffRoles=['staff','admin','master_staff'];
  const $=s=>document.querySelector(s);
  const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
  const money=v=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(Number(v||0));
  const date=v=>v?new Intl.DateTimeFormat('en-US',{dateStyle:'medium',timeStyle:'short'}).format(new Date(v)):'Not scheduled';
  const status=v=>esc(String(v||'pending').replaceAll('_',' '));
  const empty=t=>`<div class="empty">${esc(t)}</div>`;
  async function api(path,options={}){const response=await fetch('/api'+path,{...options,headers:{...(options.body instanceof FormData?{}:{'Content-Type':'application/json'}),Authorization:`Bearer ${state.token}`,...options.headers}});const data=await response.json().catch(()=>({}));if(response.status===401){logout();throw new Error('Please sign in again.')}if(!response.ok)throw new Error(data.error||data.errors?.[0]?.msg||'Request failed.');return data}
  function isStaff(){return staffRoles.includes(state.user?.role)}
  $('#loginForm').addEventListener('submit',async e=>{e.preventDefault();const out=$('#loginStatus');out.textContent='Signing in...';try{const data=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:$('#email').value,password:$('#password').value})}).then(async r=>{const d=await r.json();if(!r.ok)throw new Error(d.error||'Sign in failed.');return d});state.token=data.accessToken;state.user=data.user;await start()}catch(error){out.textContent=error.message}});
  function logout(){state.token='';state.user=null;state.projects=[];state.project=null;$('#workspace').classList.add('hidden');$('#login').classList.remove('hidden');$('#password').value='';$('#loginStatus').textContent=''}
  $('#signOut').onclick=logout;
  async function start(){state.projects=await api('/projects');state.project=state.projects[0]||null;$('#login').classList.add('hidden');$('#workspace').classList.remove('hidden');$('#identity').innerHTML=`<strong>${esc(state.user.name)}</strong>${esc(state.user.role.replaceAll('_',' '))}`;buildNav();navigate('overview')}
  function buildNav(){const items=isStaff()?[['overview','Delivery queue'],['clients','Clients'],['appointments','Appointments']]:[['overview','My project'],['messages','Messages'],['files','Documents'],['requests','Requests'],['billing','Billing']];$('#nav').innerHTML=items.map(([id,label])=>`<button data-page="${id}">${label}</button>`).join('');$('#nav').onclick=e=>{const b=e.target.closest('button');if(b)navigate(b.dataset.page)}}
  async function navigate(page){state.page=page;document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===page));$('#content').innerHTML=empty('Loading...');try{if(isStaff())await renderStaff(page);else await renderClient(page)}catch(error){$('#content').innerHTML=`<div class="notice error">${esc(error.message)}</div>`}}
  function head(title,sub,action=''){return `<div class="page-head"><div><h1>${esc(title)}</h1><p>${esc(sub)}</p></div>${action}</div>`}
  async function projectBundle(){if(!state.project)return null;const id=state.project.id;const [project,milestones,messages,files,requests,billing]=await Promise.all([api('/projects/'+id),api('/milestones/'+id),api('/messages/'+id),api('/files/'+id),api('/requests/'+id),api('/billing/'+id)]);return{project,milestones,messages,files,requests,billing}}
  async function renderClient(page){if(!state.project){$('#content').innerHTML=head('No active project','Submit a project request from the YP Labs site.')+empty('No project is connected to this account yet.');return}const b=await projectBundle();if(page==='overview')renderOverview(b);if(page==='messages')renderMessages(b);if(page==='files')renderFiles(b);if(page==='requests')renderRequests(b);if(page==='billing')renderBilling(b)}
  function renderOverview(b){const done=b.milestones.filter(x=>x.status==='completed').length;$('#content').innerHTML=head('My project',`${b.project.track==='A'?'Full Blueprint':'A la carte'} package`)+`<div class="grid"><div class="card"><div class="card-body"><div class="muted">Project status</div><div class="metric accent">${status(b.project.status)}</div></div></div><div class="card"><div class="card-body"><div class="muted">Milestones</div><div class="metric">${done}/${b.milestones.length}</div></div></div><div class="card"><div class="card-body"><div class="muted">Specialist</div><div class="metric" style="font-size:20px">${esc(b.project.assigned_specialist||'Being assigned')}</div></div></div></div><div class="card" style="margin-top:14px"><div class="card-head">Build milestones</div><div class="list">${b.milestones.length?b.milestones.map(m=>`<div class="row"><div><div class="row-title">${esc(m.title)}</div><div class="row-sub">${date(m.estimated_date)}</div></div><span class="badge ${m.status==='completed'?'green':''}">${status(m.status)}</span></div>`).join(''):empty('Milestones will appear after onboarding.')}</div></div>`}
  function messageRows(items){return items.length?items.map(m=>`<div class="message ${m.sender_id===state.user.id?'mine':''}"><div>${esc(m.body)}</div><div class="message-meta">${esc(m.sender_name||'Team')} · ${date(m.created_at)}</div></div>`).join(''):empty('No messages yet.')}
  function renderMessages(b){$('#content').innerHTML=head('Messages','Direct line to your YP Labs delivery team')+`<div class="card"><div class="thread" id="thread">${messageRows(b.messages)}</div><form class="card-body form" id="messageForm"><textarea class="input" id="messageBody" rows="3" maxlength="4000" placeholder="Write a message..." required></textarea><button class="btn primary" type="submit">Send message</button></form></div>`;$('#messageForm').onsubmit=async e=>{e.preventDefault();await api('/messages/'+state.project.id,{method:'POST',body:JSON.stringify({body:$('#messageBody').value})});navigate('messages')}}
  function renderFiles(b){$('#content').innerHTML=head('Documents','Deliverables uploaded by your specialist team')+`<div class="card list">${b.files.length?b.files.map(f=>`<div class="row"><div><div class="row-title">${esc(f.filename)}</div><div class="row-sub">${esc(f.uploaded_by_name)} · ${date(f.created_at)}</div></div><span>${Math.round(Number(f.file_size||0)/1024)} KB</span><span>${esc(f.file_type||'File')}</span><a class="btn small" href="${esc(f.file_url)}" target="_blank" rel="noopener">Open</a></div>`).join(''):empty('No documents have been delivered yet.')}</div>`}
  function renderRequests(b){$('#content').innerHTML=head('Requests','Items your specialist needs from you')+`<div class="list card">${b.requests.length?b.requests.map(r=>`<div class="row"><div><div class="row-title">${esc(r.title)}</div><div class="row-sub">${esc(r.description)}</div></div><span class="badge">${status(r.status)}</span><span>${date(r.created_at)}</span><button class="btn small" onclick="respondRequest('${r.id}')" ${r.status!=='open'?'disabled':''}>Respond</button></div>`).join(''):empty('You are all caught up.')}</div>`}
  window.respondRequest=async id=>{const note=prompt('Response note');if(note===null)return;const form=new FormData();form.append('note',note);await api(`/requests/${state.project.id}/${id}/respond`,{method:'POST',body:form});navigate('requests')}
  function renderBilling(b){if(!b.billing){$('#content').innerHTML=head('Billing','Payment arrangement')+empty('Your payment plan is being prepared.');return}const amount=b.billing.plan_type==='financed'?b.billing.installment_amount:b.billing.subtotal;$('#content').innerHTML=head('Billing','Secure payment through Stripe')+`<div class="grid two"><div class="card"><div class="card-head">Payment plan <span class="badge ${b.billing.status==='paid'?'green':'amber'}">${status(b.billing.status)}</span></div><div class="card-body"><div class="muted">${b.billing.plan_type==='financed'?'Installment':'Amount due'}</div><div class="metric amber">${money(amount)}</div><p class="muted">${b.billing.installments_paid} of ${b.billing.installments_total} payments recorded</p><button class="btn primary" id="payButton" ${b.billing.status==='paid'?'disabled':''}>Continue to secure payment</button></div></div><div class="card"><div class="card-head">Hosting and maintenance</div><div class="card-body"><div class="metric">${money(state.project.hosting_monthly)}<span class="muted" style="font-size:14px">/month</span></div><p class="muted">Hosting, server maintenance, monitoring, and infrastructure support.</p></div></div></div>`;const pay=$('#payButton');if(pay)pay.onclick=async()=>{pay.disabled=true;pay.textContent='Opening Stripe...';try{const data=await api('/billing/'+state.project.id+'/checkout',{method:'POST',body:'{}'});location.href=data.checkout_url}catch(e){pay.disabled=false;pay.textContent=e.message}}}
  async function renderStaff(page){if(page==='overview')return renderQueue();if(page==='clients')return renderClients();if(page==='appointments')return renderAppointments()}
  function renderQueue(){const active=state.projects.filter(p=>!['delivered','cancelled'].includes(p.status));$('#content').innerHTML=head('Delivery queue','All active YP Labs builds')+`<div class="grid"><div class="card"><div class="card-body"><div class="muted">Active projects</div><div class="metric">${active.length}</div></div></div><div class="card"><div class="card-body"><div class="muted">Awaiting contact</div><div class="metric amber">${state.projects.filter(p=>p.status==='awaiting_specialist_contact').length}</div></div></div><div class="card"><div class="card-body"><div class="muted">In production</div><div class="metric accent">${state.projects.filter(p=>p.status==='in_production').length}</div></div></div></div><div class="card list" style="margin-top:14px">${active.length?active.map(projectRow).join(''):empty('No active projects.')}</div>`}
  function projectRow(p){return `<div class="row"><div><div class="row-title">${esc(p.client_name)}</div><div class="row-sub">${esc(p.client_email)} · ${p.track==='A'?'Full Blueprint':'A la carte'}</div></div><span class="badge">${status(p.status)}</span><span>${money(p.subtotal)}</span><button class="btn small" onclick="openProject('${p.id}')">Open</button></div>`}
  function renderClients(){const byClient=new Map();state.projects.forEach(p=>byClient.set(p.user_id,p));$('#content').innerHTML=head('Clients','Project and contact directory')+`<div class="card list">${state.projects.length?state.projects.map(projectRow).join(''):empty('No clients yet.')}</div>`}
  window.openProject=async id=>{state.project=state.projects.find(p=>p.id===id);const b=await projectBundle();$('#content').innerHTML=head(b.project.client_name,'Project operations',`<button class="btn" onclick="navigate('overview')">Back to queue</button>`)+`<div class="grid two"><div class="card"><div class="card-head">Project status</div><div class="card-body form"><select class="input" id="projectStatus">${['awaiting_specialist_contact','onboarding','awaiting_payment','in_production','delivered','cancelled'].map(s=>`<option value="${s}" ${s===b.project.status?'selected':''}>${status(s)}</option>`).join('')}</select><input class="input" id="specialist" value="${esc(b.project.assigned_specialist||'')}" placeholder="Assigned specialist"><textarea class="input" id="notes" rows="5" placeholder="Internal notes">${esc(b.project.internal_notes||'')}</textarea><button class="btn primary" id="saveProject">Save project</button></div></div><div class="card"><div class="card-head">Milestones</div><div class="list">${b.milestones.map(m=>`<div class="row"><div class="row-title">${esc(m.title)}</div><span class="badge">${status(m.status)}</span></div>`).join('')||empty('No milestones.')}</div><form class="card-body form" id="milestoneForm"><input class="input" id="milestoneTitle" placeholder="New milestone title" required><button class="btn" type="submit">Add milestone</button></form></div></div>`;$('#saveProject').onclick=async()=>{await api('/projects/'+id,{method:'PATCH',body:JSON.stringify({status:$('#projectStatus').value,assigned_specialist:$('#specialist').value,internal_notes:$('#notes').value})});state.projects=await api('/projects');alert('Project saved.')};$('#milestoneForm').onsubmit=async e=>{e.preventDefault();await api('/milestones/'+id,{method:'POST',body:JSON.stringify({title:$('#milestoneTitle').value})});openProject(id)}}
  async function renderAppointments(){const items=await api('/appointments');$('#content').innerHTML=head('Appointments','Lead and client schedule')+`<div class="grid two"><div class="card list">${items.length?items.map(a=>`<div class="row"><div><div class="row-title">${esc(a.lead_name)}</div><div class="row-sub">${esc(a.lead_email||'')} · ${date(a.scheduled_at)}</div></div><span class="badge">${status(a.status)}</span></div>`).join(''):empty('No appointments scheduled.')}</div><form class="card card-body form" id="appointmentForm"><label class="field"><span>Name</span><input class="input" id="apptName" required></label><label class="field"><span>Email</span><input class="input" id="apptEmail" type="email"></label><label class="field"><span>Date and time</span><input class="input" id="apptDate" type="datetime-local" required></label><button class="btn primary">Schedule appointment</button></form></div>`;$('#appointmentForm').onsubmit=async e=>{e.preventDefault();await api('/appointments',{method:'POST',body:JSON.stringify({lead_name:$('#apptName').value,lead_email:$('#apptEmail').value,scheduled_at:new Date($('#apptDate').value).toISOString()})});navigate('appointments')}}
</script>
</body>
</html>
