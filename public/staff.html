<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Staff Portal | YP Labs</title><style>:root{--bg:#080d14;--panel:#101722;--panel2:#151e2b;--line:#273244;--text:#f5f7fa;--muted:#99a6b8;--cyan:#4fd3ec;--amber:#e8a23d;--green:#5fd79a;--red:#ff8181}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.45 Inter,system-ui,sans-serif}.login{min-height:100vh;display:grid;place-items:center;padding:20px}.card{background:var(--panel);border:1px solid var(--line);border-radius:8px}.login .card{width:min(430px,100%);padding:24px}.shell{display:grid;grid-template-columns:250px 1fr;min-height:100vh}.side{border-right:1px solid var(--line);background:#0b111a;padding:18px}.brand{font-size:18px;font-weight:850;margin-bottom:18px}.nav{display:grid;gap:8px}.nav button,.btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:6px;padding:9px 11px;text-align:left;cursor:pointer}.nav button.active,.btn.primary{background:var(--cyan);border-color:var(--cyan);color:#061018;font-weight:800}.content{padding:24px}.top{display:flex;justify-content:space-between;gap:15px;align-items:flex-start;margin-bottom:18px}.muted{color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.list{display:grid}.row{display:grid;grid-template-columns:1.4fr .8fr .8fr auto;gap:12px;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line)}.row:last-child{border:0}.row:hover{background:var(--panel2)}.title{font-weight:750}.sub{color:var(--muted);font-size:12px}.input{width:100%;padding:10px;background:#0b111a;border:1px solid var(--line);border-radius:6px;color:var(--text)}.form{display:grid;gap:10px}.hidden{display:none!important}.metric{font-size:28px;font-weight:850}.badge{display:inline-flex;border-radius:99px;padding:3px 8px;background:#172535;color:var(--cyan);font-size:11px;text-transform:capitalize}@media(max-width:850px){.shell{grid-template-columns:1fr}.side{border-right:0;border-bottom:1px solid var(--line)}.grid{grid-template-columns:1fr}.row{grid-template-columns:1fr auto}.row>*:nth-child(2),.row>*:nth-child(3){display:none}}</style></head><body>
<div id="login" class="login"><form class="card form" id="loginForm"><h1>YP Labs Staff</h1><p class="muted">Enter the staff portal password.</p><input class="input" id="pw" type="password" autocomplete="current-password" required><button class="btn primary">Enter portal</button><a class="btn" href="/" style="text-align:center;text-decoration:none">Back to site</a><div class="muted" id="status"></div></form></div>
<div id="app" class="shell hidden"><aside class="side"><div class="brand">YP Labs Staff</div><nav class="nav" id="nav"></nav><button class="btn" onclick="logout()" style="margin-top:16px">Sign out</button></aside><main class="content" id="content"></main></div>
<script>
const S={pw:localStorage.getItem('yp_staff_pw')||'',page:'queue',data:null,project:null};const $=s=>document.querySelector(s);const money=v=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(Number(v||0));const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const date=v=>v?new Date(v).toLocaleString():'-';const badge=v=>`<span class="badge">${esc(String(v||'pending').replaceAll('_',' '))}</span>`;async function api(path,opt={}){const r=await fetch('/api/staff'+path,{...opt,headers:{'x-staff-password':S.pw,...(opt.body instanceof FormData?{}:{'Content-Type':'application/json'}),...opt.headers}});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||'Request failed');return d}function logout(){localStorage.removeItem('yp_staff_pw');S.pw='';$('#app').classList.add('hidden');$('#login').classList.remove('hidden')}$('#loginForm').onsubmit=async e=>{e.preventDefault();S.pw=$('#pw').value;$('#status').textContent='Checking...';try{await load();localStorage.setItem('yp_staff_pw',S.pw);$('#login').classList.add('hidden');$('#app').classList.remove('hidden');nav('queue')}catch(err){$('#status').textContent=err.message}};async function load(){S.data=await api('/overview')}function buildNav(){const items=[['queue','Requests'],['clients','Clients'],['appointments','Appointments'],['staff','Invite staff']];$('#nav').innerHTML=items.map(i=>`<button class="${S.page===i[0]?'active':''}" onclick="nav('${i[0]}')">${i[1]}</button>`).join('')}async function nav(p){S.page=p;buildNav();if(!S.data)await load();if(p==='queue')queue();if(p==='clients')clients();if(p==='appointments')appointments();if(p==='staff')staffInvite()}function head(t,s){return `<div class="top"><div><h1>${esc(t)}</h1><p class="muted">${esc(s)}</p></div><button class="btn" onclick="refresh()">Refresh</button></div>`}async function refresh(){await load();nav(S.page)}function queue(){const p=S.data.projects;$('#content').innerHTML=head('Business plan and technology requests','Wizard submissions, estimates, project status, invoices, messages, and files.')+`<div class="grid"><div class="card" style="padding:16px"><div class="muted">Active requests</div><div class="metric">${p.length}</div></div><div class="card" style="padding:16px"><div class="muted">Awaiting contact</div><div class="metric">${p.filter(x=>x.status==='awaiting_specialist_contact').length}</div></div><div class="card" style="padding:16px"><div class="muted">Pipeline value</div><div class="metric">${money(p.reduce((a,b)=>a+Number(b.subtotal||0),0))}</div></div></div><div class="card list" style="margin-top:14px">${p.map(row).join('')||'<div class="row">No requests yet.</div>'}</div>`}function row(p){return `<div class="row"><div><div class="title">${esc(p.client_name||'Client')}</div><div class="sub">${esc(p.business_name||'No business')} · ${esc(p.client_email)} · ${esc(p.client_phone||'No phone')}</div></div>${badge(p.status)}<span>${money(p.subtotal)}</span><button class="btn" onclick="openProject('${p.id}')">Open</button></div>`}async function openProject(id){S.project=await api('/projects/'+id);const b=S.project,p=b.project;$('#content').innerHTML=head(p.client_name,'Client details, invoice controls, messages, and file upload')+`<div class="grid"><div class="card" style="padding:16px"><h3>Contact</h3><p>${esc(p.client_email)}<br>${esc(p.client_phone||'No phone')}<br>${esc(p.business_name||'No business')}</p></div><form class="card form" style="padding:16px" id="statusForm"><h3>Status</h3><select class="input" id="pstatus">${['awaiting_specialist_contact','onboarding','awaiting_payment','in_production','delivered','cancelled'].map(s=>`<option ${s===p.status?'selected':''}>${s}</option>`).join('')}</select><input class="input" id="specialist" placeholder="Assigned specialist" value="${esc(p.assigned_specialist||'')}"><textarea class="input" id="notes" rows="3" placeholder="Internal notes">${esc(p.internal_notes||'')}</textarea><button class="btn primary">Update project</button></form><form class="card form" style="padding:16px" id="invoiceForm"><h3>Invoice</h3><input class="input" id="subtotal" type="number" placeholder="Subtotal" value="${Number(b.billing?.subtotal||p.subtotal||0)}"><input class="input" id="installment" type="number" placeholder="3 month installment" value="${Number(b.billing?.installment_amount||0)}"><button class="btn primary">Update invoice</button></form></div><div class="grid" style="margin-top:14px"><form class="card form" style="padding:16px" id="msgForm"><h3>Send client message</h3><textarea class="input" id="msg" rows="5" required></textarea><button class="btn primary">Send to dashboard</button></form><form class="card form" style="padding:16px" id="fileForm"><h3>Upload file</h3><input class="input" type="file" id="file" required><button class="btn primary">Upload to client dashboard</button></form><div class="card" style="padding:16px"><h3>Package items</h3>${b.items.map(i=>`<p>${esc(i.label)} — ${money(i.amount)}</p>`).join('')||'<p class="muted">No items.</p>'}</div></div>`;$('#statusForm').onsubmit=async e=>{e.preventDefault();await api('/projects/'+p.id,{method:'PATCH',body:JSON.stringify({status:$('#pstatus').value,assigned_specialist:$('#specialist').value,internal_notes:$('#notes').value})});alert('Project updated')};$('#invoiceForm').onsubmit=async e=>{e.preventDefault();await api('/projects/'+p.id+'/invoice',{method:'POST',body:JSON.stringify({subtotal:Number($('#subtotal').value),installment_amount:Number($('#installment').value),status:'pending_confirmation'})});alert('Invoice updated')};$('#msgForm').onsubmit=async e=>{e.preventDefault();await api('/projects/'+p.id+'/message',{method:'POST',body:JSON.stringify({body:$('#msg').value})});alert('Message sent');$('#msg').value=''};$('#fileForm').onsubmit=async e=>{e.preventDefault();const f=new FormData();f.append('file',$('#file').files[0]);await api('/projects/'+p.id+'/upload',{method:'POST',body:f});alert('File uploaded')}}function clients(){const c=S.data.clients;$('#content').innerHTML=head('Clients','Client list and contact details')+`<div class="card list">${c.map(x=>`<div class="row"><div><div class="title">${esc(x.name)}</div><div class="sub">${esc(x.business_name||'No business')}</div></div><span>${esc(x.email)}</span><span>${esc(x.phone||'')}</span>${badge(x.status)}</div>`).join('')||'<div class="row">No clients.</div>'}</div>`}function appointments(){const a=S.data.appointments;$('#content').innerHTML=head('Appointments','Scheduled calls and consultations')+`<div class="card list">${a.map(x=>`<div class="row"><div><div class="title">${esc(x.lead_name||'Appointment')}</div><div class="sub">${esc(x.lead_email||'')} · ${esc(x.lead_phone||'')}</div></div><span>${date(x.scheduled_at)}</span>${badge(x.status)}<span></span></div>`).join('')||'<div class="row">No appointments.</div>'}</div>`}function staffInvite(){$('#content').innerHTML=head('Invite staff','Create a staff account and temporary password')+`<form class="card form" style="padding:16px;max-width:520px" id="invite"><input class="input" id="iname" placeholder="Name"><input class="input" id="iemail" type="email" placeholder="Email" required><button class="btn primary">Create staff invite</button><p class="muted" id="inviteOut"></p></form>`;$('#invite').onsubmit=async e=>{e.preventDefault();const d=await api('/staff-invites',{method:'POST',body:JSON.stringify({name:$('#iname').value,email:$('#iemail').value})});$('#inviteOut').textContent='Temporary password: '+d.temporaryPassword}}if(S.pw){load().then(()=>{$('#login').classList.add('hidden');$('#app').classList.remove('hidden');nav('queue')}).catch(()=>{})}
</script></body></html>
