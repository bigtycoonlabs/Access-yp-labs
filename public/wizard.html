<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Business Blueprint Wizard | Access YP Labs</title><style>body{margin:0;background:#08111f;color:#eef5fb;font:15px/1.55 Inter,system-ui,sans-serif}.wrap{max-width:960px;margin:auto;padding:40px 20px}.card{background:#0e1a2b;border:1px solid #243852;border-radius:10px;padding:24px;margin:14px 0}.btn{display:inline-flex;border:1px solid #243852;background:#13243a;color:#eef5fb;border-radius:10px;padding:11px 15px;font-weight:800;text-decoration:none;cursor:pointer}.primary{background:#4fd3ec;border-color:#4fd3ec;color:#06111d}.field{display:grid;gap:6px;margin:12px 0}.input{width:100%;box-sizing:border-box;padding:12px;border:1px solid #243852;border-radius:10px;background:#091423;color:#eef5fb}.choice{display:block;width:100%;text-align:left;margin:10px 0;padding:14px;border:1px solid #243852;border-radius:10px;background:#13243a;color:#eef5fb}.on{border-color:#4fd3ec}.muted{color:#8da3bb}.row{display:flex;justify-content:space-between;gap:12px;margin-top:18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.estimate{border:1px solid #54d99066;background:#54d99014;border-radius:10px;padding:14px;margin:12px 0}.amount{font-size:34px;font-weight:900;color:#54d990}.plan{white-space:pre-wrap;background:#091423;border:1px solid #243852;border-radius:10px;padding:14px}@media(max-width:760px){.grid{grid-template-columns:1fr}}</style></head>
<body><main class="wrap"><a class="btn" href="/">Back to Access YP Labs</a><div class="card" id="app"></div></main><script>
const services=[['marketing_site','Marketing Website'],['booking_engine','Direct Booking Engine + PMS Integration'],['ai_concierge','AI Concierge Customer Receptionist'],['mobile_app','React Native Mobile App'],['web_portal','Web Application Portal'],['sop_manual','SOPs & Employee Manual'],['va_dashboard','VA Training Dashboard']];
let S={step:0,track:'B',housing_type:'',cart:[],mission:'',channel:'',payment_plan:'financed',contact:{name:'',email:'',phone:'',business_name:''},answers:{company_name:'',units:'',housing_mix:'',has_systems:'',has_va:'',va_cost:'',lead_strategies:'',ota_channels:'',local_partnerships:'',guest_comm_struggle:'',biggest_struggle:''},strategy_call:{scheduled_at:'',duration_minutes:30},quote:null,plan:null,error:'',done:false};
const money=v=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(Number(v||0));function setA(k,v){S.answers[k]=v;render()}function toggle(id){S.cart=S.cart.includes(id)?S.cart.filter(x=>x!==id):[...S.cart,id];render()}function choice(on,label,fn){return `<button class="choice ${on?'on':''}" onclick="${fn}">${label}</button>`}function ok(){if(S.step===0)return S.contact.business_name&&S.answers.units&&S.housing_type;if(S.step===1)return S.answers.has_systems&&S.answers.has_va;if(S.step===2)return S.answers.lead_strategies&&S.answers.biggest_struggle.length>4;if(S.step===3)return S.track==='A'||S.cart.length;if(S.step===4)return S.contact.name&&S.contact.email;return true}async function getQuote(){const r=await fetch('/api/wizard/quote',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({track:S.track,cart:S.cart,payment_plan:'financed'})});S.quote=await r.json()}function est(){return S.quote?`<div class="estimate"><div class="muted">Estimated package cost</div><div class="amount">${money(S.quote.subtotal)}</div><p class="muted">Three-month finance option: ${money(S.quote.installmentAmount)} per month for ${S.quote.installmentMonths} months. Estimated monthly maintenance: ${money(S.quote.monthlyMaintenance)}.</p></div>`:''}async function next(){if(!ok())return;if(S.step===3)await getQuote();S.step++;render()}function back(){S.step=Math.max(0,S.step-1);render()}async function send(){try{S.error='';S.mission=S.answers.biggest_struggle;S.channel=S.answers.ota_channels;S.contact.business_name=S.contact.business_name||S.answers.company_name;const r=await fetch('/api/wizard/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(S)});const d=await r.json();if(!r.ok)throw Error(d.error||'Submission failed');S.quote=d.quote||S.quote;S.plan=d.business_plan;S.done=true;render()}catch(e){S.error=e.message;render()}}
function renderPlan(){if(!S.plan)return '';return `<h2>Your business blueprint</h2><div class="plan">Overview: ${S.plan.summary}\n\nRecommended technology: ${S.plan.recommended_modules.map(x=>x.label).join(', ')}\n\nOperational gaps: ${S.plan.operational_gaps.join('; ')}\n\nExecution timeline: ${S.plan.execution_timeline}\n\nBuildout plan:\n- ${S.plan.buildout_scope.join('\n- ')}</div>`}
function render(){if(S.done){app.innerHTML=`<h1>Blueprint created.</h1>${est()}${renderPlan()}<p class="muted">Create your client profile so this open business buildout project appears in your dashboard. Your strategy call request will appear in the staff dashboard.</p><div class="row"><a class="btn primary" href="/register.html?email=${encodeURIComponent(S.contact.email)}">Create client account</a><a class="btn" href="/dashboard.html">Client login</a></div>`;return}let h='';if(S.step===0)h=`<h1>Company and portfolio</h1><div class="grid"><label class="field">Company name<input class="input" value="${S.contact.business_name}" oninput="S.contact.business_name=this.value;S.answers.company_name=this.value"></label><label class="field">Units currently managed<input class="input" type="number" value="${S.answers.units}" oninput="S.answers.units=this.value"></label></div><label class="field">Housing model mix<textarea class="input" rows="4" oninput="S.answers.housing_mix=this.value" placeholder="Short-term rental, mid-term rental, co-living, sober living, group home style, or mixture.">${S.answers.housing_mix}</textarea></label>${choice(S.housing_type==='corporate_housing','Corporate housing provider',"S.housing_type='corporate_housing';render()")}${choice(S.housing_type==='furnished_rental','Furnished rental / short-term rental operator',"S.housing_type='furnished_rental';render()")}${choice(S.housing_type==='shared_living','Co-living / group housing model',"S.housing_type='shared_living';render()")}`;if(S.step===1)h=`<h1>Operations and staffing</h1><p class="muted">Tell us what is already in place so the blueprint focuses on the real gaps.</p><h3>Do you already have systems for daily operations?</h3>${choice(S.answers.has_systems==='yes','Yes, we have documented systems',"setA('has_systems','yes')")}${choice(S.answers.has_systems==='no','No, operations are mostly manual',"setA('has_systems','no')")}<h3>Do you have a virtual property manager or VA managing guest communications?</h3>${choice(S.answers.has_va==='yes','Yes',"setA('has_va','yes')")}${choice(S.answers.has_va==='no','No',"setA('has_va','no')")}<label class="field">If yes, how much are you paying monthly?<input class="input" value="${S.answers.va_cost}" oninput="S.answers.va_cost=this.value" placeholder="$ amount or compensation model"></label>`;if(S.step===2)h=`<h1>Lead generation and biggest constraint</h1><h3>Are you utilizing multiple strategies for acquiring guest leads?</h3>${choice(S.answers.lead_strategies==='multi','Yes, multiple lead strategies',"setA('lead_strategies','multi')")}${choice(S.answers.lead_strategies==='ota_only','Mostly Airbnb / VRBO / OTA platforms',"setA('lead_strategies','ota_only')")}<label class="field">Which OTA channels are you currently using?<input class="input" value="${S.answers.ota_channels}" oninput="S.answers.ota_channels=this.value" placeholder="Airbnb, VRBO, Furnished Finder, Booking.com, direct, referrals..."></label><h3>Do you use local sponsorships, brand opportunities, or local partnerships?</h3>${choice(S.answers.local_partnerships==='yes','Yes',"setA('local_partnerships','yes')")}${choice(S.answers.local_partnerships==='no','No / not yet',"setA('local_partnerships','no')")}<h3>Is guest communication a bottleneck?</h3>${choice(S.answers.guest_comm_struggle==='yes','Yes',"setA('guest_comm_struggle','yes')")}${choice(S.answers.guest_comm_struggle==='no','No',"setA('guest_comm_struggle','no')")}<label class="field">Biggest struggle right now<textarea class="input" rows="5" oninput="S.answers.biggest_struggle=this.value">${S.answers.biggest_struggle}</textarea></label>`;if(S.step===3)h=`<h1>Suggested technology path</h1><p class="muted">Select the build path you want us to price and blueprint.</p>${choice(S.track==='A','Full Architecture Tech Package',"S.track='A';render()")}${choice(S.track==='B','A la carte buildout',"S.track='B';render()")}<div>${S.track==='A'?choice(S.cart.includes('ai_concierge'),'Add AI Concierge Customer Receptionist',"toggle('ai_concierge')"):services.map(x=>choice(S.cart.includes(x[0]),x[1],`toggle('${x[0]}')`)).join('')}</div>`;if(S.step===4)h=`<h1>Contact and strategy call</h1>${est()}<div class="grid"><label class="field">Name<input class="input" value="${S.contact.name}" oninput="S.contact.name=this.value"></label><label class="field">Email<input class="input" type="email" value="${S.contact.email}" oninput="S.contact.email=this.value"></label><label class="field">Phone<input class="input" value="${S.contact.phone}" oninput="S.contact.phone=this.value"></label><label class="field">Preferred strategy call time<input class="input" type="datetime-local" value="${S.strategy_call.scheduled_at}" oninput="S.strategy_call.scheduled_at=this.value?new Date(this.value).toISOString():''"></label></div>`;app.innerHTML=h+`<div class="row"><button class="btn" onclick="${S.step?'back()':'location.href=\'\/\''}">${S.step?'Back':'Cancel'}</button>${S.step<4?`<button class="btn primary" ${ok()?'':'disabled'} onclick="next()">Continue</button>`:`<button class="btn primary" ${ok()?'':'disabled'} onclick="send()">Create business blueprint</button>`}</div><p style="color:#ff9a9a">${S.error}</p>`}render();</script></body></html>
