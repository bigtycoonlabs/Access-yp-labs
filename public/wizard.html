<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Build Request | Access YP Labs</title><style>body{margin:0;background:#08111f;color:#eef5fb;font:15px/1.55 Inter,system-ui,sans-serif}.wrap{max-width:900px;margin:auto;padding:40px 20px}.card{background:#0e1a2b;border:1px solid #243852;border-radius:10px;padding:24px;margin:14px 0}.btn{display:inline-flex;border:1px solid #243852;background:#13243a;color:#eef5fb;border-radius:10px;padding:11px 15px;font-weight:800;text-decoration:none;cursor:pointer}.primary{background:#4fd3ec;border-color:#4fd3ec;color:#06111d}.field{display:grid;gap:6px;margin:12px 0}.input{width:100%;padding:12px;border:1px solid #243852;border-radius:10px;background:#091423;color:#eef5fb}.choice{display:block;width:100%;text-align:left;margin:10px 0;padding:14px;border:1px solid #243852;border-radius:10px;background:#13243a;color:#eef5fb}.on{border-color:#4fd3ec}.muted{color:#8da3bb}.row{display:flex;justify-content:space-between;gap:12px;margin-top:18px}.estimate{border:1px solid #54d99066;background:#54d99014;border-radius:10px;padding:14px}.amount{font-size:34px;font-weight:900;color:#54d990}</style></head>
<body><main class="wrap"><a class="btn" href="/">Back to Access YP Labs</a><div class="card" id="app"></div></main><script>
const services=[['marketing_site','Marketing Website'],['booking_engine','Direct Booking Engine + PMS Integration'],['ai_concierge','AI Concierge Customer Receptionist'],['mobile_app','React Native Mobile App'],['web_portal','Web Application Portal'],['sop_manual','SOPs & Employee Manual'],['va_dashboard','VA Training Dashboard']];const housing=[['corporate_housing','Corporate housing provider'],['furnished_rental','Furnished rental operator'],['shared_living','Shared-living operator'],['cohost','Co-hosting or management company']];let S={step:0,track:'',housing_type:'',cart:[],mission:'',channel:'',payment_plan:'financed',contact:{name:'',email:'',phone:'',business_name:''},quote:null,error:'',done:false};const money=v=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(Number(v||0));function choice(on,label,fn){return `<button class="choice ${on?'on':''}" onclick="${fn}">${label}</button>`}function ok(){return S.step===0?S.track:S.step===1?S.housing_type:S.step===2?(S.track==='A'||S.cart.length):S.step===3?S.mission.length>5:(S.contact.name&&S.contact.email)}function est(){return S.quote?`<div class="estimate"><div class="muted">Estimated package cost</div><div class="amount">${money(S.quote.subtotal)}</div><p class="muted">Three-month finance option: ${money(S.quote.installmentAmount)} per month for ${S.quote.installmentMonths} months. Estimated monthly maintenance: ${money(S.quote.monthlyMaintenance)}.</p></div>`:''}function toggle(id){S.cart=S.cart.includes(id)?S.cart.filter(x=>x!==id):[...S.cart,id];render()}async function quote(){const r=await fetch('/api/wizard/quote',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({track:S.track,cart:S.cart,payment_plan:'financed'})});S.quote=await r.json()}async function next(){if(!ok())return;if(S.step===2)await quote();S.step++;render()}function back(){S.step=Math.max(0,S.step-1);render()}async function send(){try{const r=await fetch('/api/wizard/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(S)});const d=await r.json();if(!r.ok)throw Error(d.error||'Submission failed');S.quote=d.quote||S.quote;S.done=true;render()}catch(e){S.error=e.message;render()}}function render(){if(S.done){app.innerHTML=`<h1>Request received.</h1>${est()}<p class="muted">Create your client profile to save the request and access your dashboard.</p><a class="btn primary" href="/register.html?email=${encodeURIComponent(S.contact.email)}">Create client account</a>`;return}let h='';if(S.step===0)h='<h1>What are you building?</h1>'+choice(S.track==='A','Full Architecture Tech Package',"S.track='A';render()")+choice(S.track==='B','Select individual modules',"S.track='B';render()");if(S.step===1)h='<h1>What type of housing company is this?</h1>'+housing.map(x=>choice(S.housing_type===x[0],x[1],`S.housing_type='${x[0]}';render()`)).join('');if(S.step===2)h='<h1>Select technology needs</h1>'+(S.track==='A'?choice(S.cart.includes('ai_concierge'),'Add AI Concierge Customer Receptionist',"toggle('ai_concierge')"):services.map(x=>choice(S.cart.includes(x[0]),x[1],`toggle('${x[0]}')`)).join(''));if(S.step===3)h='<h1>Business plan and strategy</h1>'+est()+`<label class="field">Current booking channel<input class="input" value="${S.channel}" oninput="S.channel=this.value"></label><label class="field">Business plan / technology needs<textarea class="input" rows="6" oninput="S.mission=this.value">${S.mission}</textarea></label>`;if(S.step===4)h='<h1>Contact details</h1>'+est()+`<label class="field">Name<input class="input" value="${S.contact.name}" oninput="S.contact.name=this.value"></label><label class="field">Email<input class="input" type="email" value="${S.contact.email}" oninput="S.contact.email=this.value"></label><label class="field">Phone<input class="input" value="${S.contact.phone}" oninput="S.contact.phone=this.value"></label><label class="field">Business name<input class="input" value="${S.contact.business_name}" oninput="S.contact.business_name=this.value"></label>`;app.innerHTML=h+`<div class="row"><button class="btn" onclick="${S.step?'back()':'location.href=\'\/\''}">${S.step?'Back':'Cancel'}</button>${S.step<4?`<button class="btn primary" ${ok()?'':'disabled'} onclick="next()">Continue</button>`:`<button class="btn primary" onclick="send()">Submit and save estimate</button>`}</div><p style="color:#ff9a9a">${S.error}</p>`}render();</script></body></html>
