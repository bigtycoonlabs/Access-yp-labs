<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Create Client Account | YP Labs</title><style>body{margin:0;background:#080d14;color:#f5f7fa;font:14px/1.5 Inter,system-ui,sans-serif}.wrap{min-height:100vh;display:grid;place-items:center;padding:20px}.card{width:min(430px,100%);background:#101722;border:1px solid #273244;border-radius:8px;padding:26px}.brand{color:#4fd3ec;font-weight:900;margin-bottom:18px}.field{display:grid;gap:6px;margin:12px 0}.field span{font-size:11px;text-transform:uppercase;color:#99a6b8}.input{padding:11px;background:#0b111a;color:#f5f7fa;border:1px solid #273244;border-radius:6px}.btn{display:block;width:100%;border:1px solid #273244;background:#151e2b;color:#f5f7fa;border-radius:6px;padding:10px 12px;text-align:center;text-decoration:none;margin-top:10px;cursor:pointer}.primary{background:#4fd3ec;border-color:#4fd3ec;color:#061018;font-weight:850}.muted{color:#99a6b8}.status{min-height:20px;color:#ff8181;font-size:12px}</style></head>
<body><main class="wrap"><form class="card" id="form"><div class="brand">YP LABS / CLIENT ACCOUNT</div><h1>Create your profile</h1><p class="muted">Use the same email from the wizard so your saved build request connects to your dashboard. You can also create an account first and complete the wizard later.</p><label class="field"><span>Name</span><input class="input" id="name" required></label><label class="field"><span>Email</span><input class="input" id="email" type="email" required></label><label class="field"><span>Password</span><input class="input" id="password" type="password" minlength="8" required></label><div class="status" id="status"></div><button class="btn primary">Create account</button><a class="btn" href="/dashboard.html">Already have an account? Sign in</a><a class="btn" href="/">Back to YP Labs</a></form></main><script>const q=new URLSearchParams(location.search);if(q.get('email'))document.getElementById('email').value=q.get('email');document.getElementById('form').addEventListener('submit',async e=>{e.preventDefault();const out=document.getElementById('status');out.textContent='Creating account...';try{const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:document.getElementById('name').value,email:document.getElementById('email').value,password:document.getElementById('password').value})});const d=await r.json();if(!r.ok)throw new Error(d.error||d.errors?.[0]?.msg||'Registration failed.');location.href='/dashboard.html'}catch(err){out.textContent=err.message}})</script></body></html>
